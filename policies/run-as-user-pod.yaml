apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-run-as-user-pod
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.runAsUser) ||
        object.spec.securityContext.runAsUser > 0
      message: >
        spec.securityContext.runAsUser must be undefined or a non-zero value (> 0).
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-run-as-user-pod-namespace-optout-warn
spec:
  policyName: check-run-as-user-pod
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["restricted"]
        - key: validating-admission-policies.kolteq.com/run-as-user-pod
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-run-as-user-pod-namespace-optin-warn
spec:
  policyName: check-run-as-user-pod
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: run-as-user-pod.validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["true"]
---
