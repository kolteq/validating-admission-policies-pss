apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-run-as-nonroot-initcontainers
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  variables:
    - name: podNonRootTrue
      expression: >
        has(object.spec.securityContext) &&
        has(object.spec.securityContext.runAsNonRoot) &&
        object.spec.securityContext.runAsNonRoot == true
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          variables.podNonRootTrue
          ? (!has(ic.securityContext) || !has(ic.securityContext.runAsNonRoot) || ic.securityContext.runAsNonRoot == true)
          : (has(ic.securityContext) && has(ic.securityContext.runAsNonRoot) && ic.securityContext.runAsNonRoot == true)
        )
      message: >
        spec.initContainers[*].securityContext.runAsNonRoot must be set to true, unless the Pod-level spec.securityContext.runAsNonRoot is true—in which case it may be undefined or true.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-run-as-nonroot-initcontainers-namespace-optout-warn
spec:
  policyName: check-run-as-nonroot-initcontainers
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["restricted"]
        - key: validating-admission-policies.kolteq.com/run-as-nonroot-initcontainers
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-run-as-nonroot-initcontainers-namespace-optin-warn
spec:
  policyName: check-run-as-nonroot-initcontainers
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: run-as-nonroot-initcontainers.validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["true"]
---
