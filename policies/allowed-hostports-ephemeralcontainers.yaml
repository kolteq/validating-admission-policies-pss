apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-allowed-hostports-ephemeralcontainers
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods/ephemeralcontainers"]
  variables:
    - name: allowedHostPorts
      # expression: >
      #   [22, 80, 443]
      expression: >
        []
  validations:
    - expression: >
        !has(object.spec.ephemeralContainers) ||
        object.spec.ephemeralContainers.all(ec,
          !has(ec.ports) ||
          ec.ports.all(p,
            !has(p.hostPort) ||
            p.hostPort == 0 ||
            variables.allowedHostPorts.exists(h, h == p.hostPort)
          )
        )
      message: >
        Ephemeral container hostPort must be undefined, 0, or in the variables.allowedHostPorts list.
