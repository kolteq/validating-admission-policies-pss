apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-prestop-tcpsocket-host-initcontainers
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.lifecycle) ||
          !has(ic.lifecycle.preStop) ||
          !has(ic.lifecycle.preStop.tcpSocket) ||
          !has(ic.lifecycle.preStop.tcpSocket.host) ||
          ic.lifecycle.preStop.tcpSocket.host == ""
        )
      message: >
        spec.initContainers[*].lifecycle.preStop.tcpSocket.host must be undefined or empty ("").
