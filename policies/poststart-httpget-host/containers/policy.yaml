apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-poststart-httpget-host-containers
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        object.spec.containers.all(c,
          !has(c.lifecycle) ||
          !has(c.lifecycle.postStart) ||
          !has(c.lifecycle.postStart.httpGet) ||
          !has(c.lifecycle.postStart.httpGet.host) ||
          c.lifecycle.postStart.httpGet.host == ""
        )
      message: >
        spec.containers[*].lifecycle.postStart.httpGet.host must be undefined or empty ("").
