apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-selinux-type
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  variables:
    - name: allowedSELinuxTypes
      expression: >
        ["container_t","container_init_t","container_kvm_t","container_engine_t"]
  validations:
    - expression: >
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.seLinuxOptions) ||
        !has(object.spec.securityContext.seLinuxOptions.type) ||
        object.spec.securityContext.seLinuxOptions.type == "" ||
        variables.allowedSELinuxTypes.exists(t, t == object.spec.securityContext.seLinuxOptions.type)
      message: >
        spec.securityContext.seLinuxOptions.type must be undefined, empty (""), or one of:
        container_t, container_init_t, container_kvm_t, container_engine_t.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-selinux-type-namespace-optout-warn
spec:
  policyName: check-selinux-type
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["baseline","restricted"]
        - key: validating-admission-policies.kolteq.com/selinux-type
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-selinux-type-namespace-optin-warn
spec:
  policyName: check-selinux-type
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: selinux-type.validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["true"]
---
