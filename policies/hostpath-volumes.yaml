apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-hostpath-volumes
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.volumes) ||
        object.spec.volumes.all(v, !has(v.hostPath))
      message: >
        HostPath volumes are disallowed. Each spec.volumes[*].hostPath must be undefined.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-hostpath-volumes-namespace-optout-warn
spec:
  policyName: check-hostpath-volumes
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["baseline", "restricted"]
        - key: validating-admission-policies.kolteq.com/hostpath-volumes
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-hostpath-volumes-namespace-optin-warn
spec:
  policyName: check-hostpath-volumes
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: hostpath-volumes.validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["true"]
---
