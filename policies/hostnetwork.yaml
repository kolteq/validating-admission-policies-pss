apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-hostnetwork
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.hostNetwork) || object.spec.hostNetwork == false
      message: >
        Using hostNetwork is disallowed. spec.hostNetwork must be undefined or set to false.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-hostnetwork-namespace-optout-warn
spec:
  policyName: check-hostnetwork
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["baseline", "restricted"]
        - key: validating-admission-policies.kolteq.com/hostnetwork
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-hostnetwork-namespace-optin-warn
spec:
  policyName: check-hostnetwork
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: hostnetwork.validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["true"]
---
