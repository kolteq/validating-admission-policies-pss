apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-livenessprobe-tcpsocket-host-containers
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        object.spec.containers.all(c,
          !has(c.livenessProbe) ||
          !has(c.livenessProbe.tcpSocket) ||
          !has(c.livenessProbe.tcpSocket.host) ||
          c.livenessProbe.tcpSocket.host == ""
        )
      message: >
        spec.containers[*].livenessProbe.tcpSocket.host must be undefined or empty ("").
