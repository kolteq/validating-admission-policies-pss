apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-allowed-sysctls
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  variables:
    - name: allowedSysctls
      expression: >
        ["kernel.shm_rmid_forced",
         "net.ipv4.ip_local_port_range",
         "net.ipv4.ip_unprivileged_port_start",
         "net.ipv4.tcp_syncookies",
         "net.ipv4.ping_group_range",
         "net.ipv4.ip_local_reserved_ports",
         "net.ipv4.tcp_keepalive_time",
         "net.ipv4.tcp_fin_timeout",
         "net.ipv4.tcp_keepalive_intvl",
         "net.ipv4.tcp_keepalive_probes"]
  validations:
    - expression: >
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.sysctls) ||
        object.spec.securityContext.sysctls.all(s,
          has(s.name) && variables.allowedSysctls.exists(a, a == s.name)
        )
      message: >
        Only the approved sysctls are allowed in spec.securityContext.sysctls[*].name.
        Allowed: kernel.shm_rmid_forced, net.ipv4.ip_local_port_range,
        net.ipv4.ip_unprivileged_port_start, net.ipv4.tcp_syncookies,
        net.ipv4.ping_group_range, net.ipv4.ip_local_reserved_ports,
        net.ipv4.tcp_keepalive_time, net.ipv4.tcp_fin_timeout,
        net.ipv4.tcp_keepalive_intvl, net.ipv4.tcp_keepalive_probes.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-allowed-sysctls-namespace-optout-warn
spec:
  policyName: check-allowed-sysctls
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["baseline","restricted"]
        - key: validating-admission-policies.kolteq.com/allowed-sysctls
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-allowed-sysctls-namespace-optin-warn
spec:
  policyName: check-allowed-sysctls
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: allowed-sysctls.validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["true"]
---
