apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-windows-hostprocess
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.windowsOptions) ||
        !has(object.spec.securityContext.windowsOptions.hostProcess) ||
        object.spec.securityContext.windowsOptions.hostProcess == false
      message: >
        HostProcess is not allowed. spec.securityContext.windowsOptions.hostProcess
        must be undefined or set to false.
