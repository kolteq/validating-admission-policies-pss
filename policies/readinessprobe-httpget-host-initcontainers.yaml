apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-readinessprobe-httpget-host-initcontainers
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.readinessProbe) ||
          !has(ic.readinessProbe.httpGet) ||
          !has(ic.readinessProbe.httpGet.host) ||
          ic.readinessProbe.httpGet.host == ""
        )
      message: >
        spec.initContainers[*].readinessProbe.httpGet.host must be undefined or empty ("").
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-readinessprobe-httpget-host-initcontainers-namespace-optout-warn
spec:
  policyName: check-readinessprobe-httpget-host-initcontainers
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["baseline","restricted"]
        - key: validating-admission-policies.kolteq.com/readinessprobe-httpget-host-initcontainers
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
