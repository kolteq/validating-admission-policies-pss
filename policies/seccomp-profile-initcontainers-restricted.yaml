apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: check-seccomp-profile-initcontainers-restricted
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  variables:
    - name: allowedSeccompTypes
      expression: >
        ["RuntimeDefault","Localhost"]
    - name: podTypePresent
      expression: >
        has(object.spec.securityContext) &&
        has(object.spec.securityContext.seccompProfile) &&
        has(object.spec.securityContext.seccompProfile.type)
    - name: podTypeAllowed
      expression: >
        variables.podTypePresent &&
        variables.allowedSeccompTypes.exists(t, t == object.spec.securityContext.seccompProfile.type)
  validations:
    - expression: >
        (has(object.spec.os) &&
         has(object.spec.os.name) &&
         object.spec.os.name.lowerAscii() == "windows") ||
        (variables.podTypeAllowed &&
         (!has(object.spec.initContainers) ||
          object.spec.initContainers.all(ic,
            !has(ic.securityContext) ||
            !has(ic.securityContext.seccompProfile) ||
            !has(ic.securityContext.seccompProfile.type) ||
            variables.allowedSeccompTypes.exists(t, t == ic.securityContext.seccompProfile.type)
          )
         )
        )
        ||
        (!variables.podTypePresent &&
         (!has(object.spec.initContainers) ||
          object.spec.initContainers.all(ic,
            has(ic.securityContext) &&
            has(ic.securityContext.seccompProfile) &&
            has(ic.securityContext.seccompProfile.type) &&
            variables.allowedSeccompTypes.exists(t, t == ic.securityContext.seccompProfile.type)
          )
         )
        )
      message: >
        spec.initContainers[*].securityContext.seccompProfile.type must be "RuntimeDefault" or "Localhost".
        Init container fields may be undefined only when the Pod-level spec.securityContext.seccompProfile.type
        is set to "RuntimeDefault" or "Localhost"; otherwise every init container must set its own to one of those values.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: check-seccomp-profile-initcontainers-restricted-namespace-optout-warn
spec:
  policyName: check-seccomp-profile-initcontainers-restricted
  validationActions:
    - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: validating-admission-policies.kolteq.com/warn
          operator: In
          values: ["restricted"]
        - key: validating-admission-policies.kolteq.com/seccomp-profile-initcontainers-restricted
          operator: NotIn
          values: ["false"]
---
apiVersion: admissionregistration.k8s.io/v1
